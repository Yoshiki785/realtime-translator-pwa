<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity=".10"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#0a0e1a"/>
  <rect width="1280" height="720" fill="url(#g1)"/>
  <!-- left bubble (source) -->
  <rect x="180" y="220" width="340" height="160" rx="20" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.1)" stroke-width="1.5"/>
  <text x="350" y="290" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="28" font-weight="600">Hello!</text>
  <text x="350" y="330" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="16">How are you today?</text>
  <text x="350" y="365" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">EN · detected</text>
  <!-- arrow -->
  <line x1="560" y1="300" x2="700" y2="300" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="710,300 695,290 695,310" fill="#38bdf8"/>
  <text x="630" y="280" text-anchor="middle" fill="#38bdf8" font-family="system-ui,sans-serif" font-size="13" font-weight="600">AI</text>
  <!-- right bubble (translation) -->
  <rect x="760" y="220" width="340" height="160" rx="20" fill="rgba(56,189,248,.06)" stroke="rgba(56,189,248,.2)" stroke-width="1.5"/>
  <text x="930" y="290" text-anchor="middle" fill="#38bdf8" font-family="system-ui,sans-serif" font-size="28" font-weight="600">こんにちは！</text>
  <text x="930" y="330" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="16">お元気ですか？</text>
  <text x="930" y="365" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">JA · translated</text>
  <!-- waveform hint -->
  <g transform="translate(540,480)" opacity=".3">
    <rect x="0" y="8" width="4" height="14" rx="2" fill="#38bdf8"/><rect x="10" y="4" width="4" height="22" rx="2" fill="#38bdf8"/>
    <rect x="20" y="0" width="4" height="30" rx="2" fill="#38bdf8"/><rect x="30" y="6" width="4" height="18" rx="2" fill="#38bdf8"/>
    <rect x="40" y="2" width="4" height="26" rx="2" fill="#38bdf8"/><rect x="50" y="8" width="4" height="14" rx="2" fill="#38bdf8"/>
    <rect x="60" y="4" width="4" height="22" rx="2" fill="#a78bfa"/><rect x="70" y="0" width="4" height="30" rx="2" fill="#a78bfa"/>
    <rect x="80" y="6" width="4" height="18" rx="2" fill="#a78bfa"/><rect x="90" y="2" width="4" height="26" rx="2" fill="#a78bfa"/>
    <rect x="100" y="8" width="4" height="14" rx="2" fill="#a78bfa"/><rect x="110" y="4" width="4" height="22" rx="2" fill="#a78bfa"/>
    <rect x="120" y="0" width="4" height="30" rx="2" fill="#38bdf8"/><rect x="130" y="6" width="4" height="18" rx="2" fill="#38bdf8"/>
    <rect x="140" y="8" width="4" height="14" rx="2" fill="#38bdf8"/><rect x="150" y="2" width="4" height="26" rx="2" fill="#38bdf8"/>
    <rect x="160" y="4" width="4" height="22" rx="2" fill="#a78bfa"/><rect x="170" y="8" width="4" height="14" rx="2" fill="#a78bfa"/>
    <rect x="180" y="0" width="4" height="30" rx="2" fill="#a78bfa"/><rect x="190" y="6" width="4" height="18" rx="2" fill="#a78bfa"/>
  </g>
  <!-- bottom label -->
  <text x="640" y="560" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">Real-time speech translation · LingoFlow</text>
