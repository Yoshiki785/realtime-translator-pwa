<!DOCTYPE html>
<html lang="ja" class="no-js">
<head>
    <!-- INCLUDE:_head.html -->
    <title>Pricing - LingoFlow</title>
    <meta name="description" content="LingoFlowの料金ページ。FreeとProの月額、請求タイミング、返金・解約ポリシーを確認できます。" />
    <link rel="canonical" href="https://lingoflow-ai.com/pricing" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pricing - LingoFlow" />
    <meta property="og:description" content="Free / Pro の料金、請求タイミング、返金・解約情報" />
    <meta property="og:image" content="https://lingoflow-ai.com/assets/images/og-default.png" />
    <meta property="og:url" content="https://lingoflow-ai.com/pricing" />
</head>
<body>
<!-- INCLUDE:_header.html -->

<main>
  <section class="lp-hero" style="padding: var(--lp-space-16) 0;">
    <div class="lp-container">
      <h1 data-animate="fade-up">Pricing</h1>
      <p data-animate="fade-up">月額料金、請求タイミング、返金・解約ポリシーをご案内します。</p>
    </div>
  </section>

  <section class="lp-section" data-section="pricing-details">
    <div class="lp-container">
      <div class="lp-feature-grid" data-animate-stagger>
        <article class="lp-feature-item" data-animate="fade-up">
          <h2 class="lp-feature-title">Free</h2>
          <p><strong>月額: ¥0/月</strong></p>
          <p>月20分（1日10分）まで利用可能。</p>
        </article>
        <article class="lp-feature-item" data-animate="fade-up">
          <h2 class="lp-feature-title">Pro</h2>
          <p><strong>月額: ¥980/月（税込）</strong></p>
          <p>チェックアウト時に即時課金され、以降は毎月自動更新されます。</p>
        </article>
      </div>
    </div>
  </section>

  <section class="lp-section" data-section="refund-cancellation">
    <div class="lp-container">
      <div class="lp-section-header" data-animate="fade-up">
        <h2>Refund &amp; Cancellation</h2>
      </div>
      <div class="lp-feature-item" data-animate="fade-up">
        <p><strong>返金:</strong> 原則返金なし。</p>
        <p><strong>解約:</strong> Stripe Customer Portalから可能です。</p>
        <p>解約後の利用可能期間はプランの更新日に基づきます（詳細は <a href="/terms" class="lp-link">/terms</a>）。</p>
      </div>
      <p style="color: var(--lp-fg-muted); margin-top: var(--lp-space-6);">
        関連リンク:
        <a href="/terms" class="lp-link">利用規約</a> ・
        <a href="/privacy" class="lp-link">プライバシーポリシー</a> ・
        <a href="/contact" class="lp-link">お問い合わせ</a>
      </p>
    </div>
  </section>
</main>

<!-- INCLUDE:_footer.html -->
</body>
</html>
