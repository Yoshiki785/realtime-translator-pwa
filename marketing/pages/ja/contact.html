<!-- INCLUDE:_header.html -->

<main>
  <section class="lp-hero" style="padding: var(--lp-space-16) 0;">
    <div class="lp-container">
      <h1 data-animate="fade-up">お問い合わせ</h1>
      <p data-animate="fade-up">お気軽にご連絡ください。</p>
    </div>
  </section>

  <section class="lp-section" data-section="contact">
    <div class="lp-container">
      <div class="lp-contact-grid">
        <div class="lp-contact-card" data-animate="fade-up">
          <h3>メール</h3>
          <p>お問い合わせ・サポート</p>
          <a href="mailto:lingoflow.cus@gmail.com" class="lp-link" data-analytics="cta_click" data-analytics-label="contact-email">lingoflow.cus@gmail.com</a>
        </div>
        <div class="lp-contact-card" data-animate="fade-up">
          <h3>お問い合わせフォーム</h3>
          <p>フォームから直接メッセージを送信</p>
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSevSNsYZtukK-MYwuPyz07O0qCKWy_2GUL-fa0BinjLi5WwEQ/viewform?usp=header" target="_blank" rel="noopener noreferrer" class="lp-link" data-analytics="cta_click" data-analytics-label="contact-form">フォームを開く &rarr;</a>
        </div>
        <div class="lp-contact-card" data-animate="fade-up">
          <h3>回答までの目安</h3>
          <p>通常3営業日以内にご返信いたします。</p>
        </div>
      </div>
    </div>
  </section>
