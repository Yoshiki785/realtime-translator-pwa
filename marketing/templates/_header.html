<script>
(function(){var K='lf_lang',S='lf_lang_redirected';try{
var C={en:'en',ja:'ja','zh-hans':'zh-Hans'};
function N(l){return C[String(l).toLowerCase()]||l;}
var cl=document.documentElement.lang;
var sl=localStorage.getItem(K);
var ls=document.querySelectorAll('link[rel="alternate"][hreflang]');
var alt={},n=0;
for(var i=0;i<ls.length;i++){var h=ls[i].getAttribute('hreflang');if(h&&h.toLowerCase()!=='x-default'){alt[h.toLowerCase()]=ls[i].href;n++;}}
if(n<2){if(!sl)localStorage.setItem(K,N(cl));return;}
if(!sl){localStorage.setItem(K,N(cl));return;}
if(sl.toLowerCase()===cl.toLowerCase())return;
var url=alt[sl.toLowerCase()];if(!url)return;
if(sessionStorage.getItem(S)==='true')return;
sessionStorage.setItem(S,'true');location.replace(url);
}catch(e){}})();
</script>
