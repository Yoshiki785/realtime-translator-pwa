<script>
(function(){var K='lf_lang',S='lf_lang_redirected';try{
var C={en:'en',ja:'ja','zh-hans':'zh-Hans',vi:'vi'};
function N(l){return C[String(l).toLowerCase()]||l;}
var cl=document.documentElement.lang;
var sl=localStorage.getItem(K);
var ls=document.querySelectorAll('link[rel="alternate"][hreflang]');
var alt={},n=0;
for(var i=0;i<ls.length;i++){var h=ls[i].getAttribute('hreflang');if(h&&h.toLowerCase()!=='x-default'){alt[h.toLowerCase()]=ls[i].href;n++;}}
if(n<2){if(!sl)localStorage.setItem(K,N(cl));return;}
if(!sl){localStorage.setItem(K,N(cl));return;}
if(sl.toLowerCase()===cl.toLowerCase())return;
var url=alt[sl.toLowerCase()];if(!url)return;
if(sessionStorage.getItem(S)==='true')return;
sessionStorage.setItem(S,'true');location.replace(url);
}catch(e){}})();
</script>

<script>
(function(){
  function buildFallback(){
    var parts=location.pathname.split('/').filter(Boolean);
    if(parts[0]==='en'||parts[0]==='ja'||parts[0]==='zh-hans'||parts[0]==='vi')parts.shift();
    if(parts.length&&/^ja-(en|zh)$/i.test(parts[parts.length-1]))parts.pop();
    var slug=parts.join('/').replace(/^\/+|\/+$/g,'');
    return{
      en:slug?'/'+slug:'/',
      ja:slug?'/ja/'+slug:'/ja',
      'zh-hans':slug?'/zh-hans/'+slug:'/zh-hans',
      vi:slug?'/vi/'+slug:'/vi'
    };
  }
  var alt={};
  var links=document.querySelectorAll('link[rel="alternate"][hreflang]');
  for(var i=0;i<links.length;i++){
    var h=links[i].getAttribute('hreflang');
    if(h&&h.toLowerCase()!=='x-default')alt[h.toLowerCase()]=links[i].href;
  }
  var map=Object.keys(alt).length?alt:buildFallback();
  var opts=document.querySelectorAll('.lp-lang-option,.lp-lang-option-mobile');
  for(var j=0;j<opts.length;j++){
    var lang=opts[j].getAttribute('data-lang');
    if(lang){var url=map[lang.toLowerCase()];if(url)opts[j].href=url;}
  }
})();
</script>
